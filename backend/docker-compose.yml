version: "3.9"

services:
  db:
    image: postgres:17.4
    restart: always
    environment:
      POSTGRES_DB: EarthquakeDB
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    volumes:
      - backend_pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  backend_pgdata: